<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>All Projects | Hafiz Ahmed</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* Shared CSS from main page */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050A;
  --surface:#0e0e16;
  --surface2:#161622;
  --accent:#8b78fa;
  --accent2:#b3a1fa;
  --text:#f8f7ff;
  --muted:#9999aa;
  --border:rgba(139, 120, 250, 0.15);
  --card-bg:#0d0d14;
  --glow: rgba(139, 120, 250, 0.4);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Navigation */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;background:transparent;transition:all 0.3s ease;border-bottom:1px solid transparent;}
nav.scrolled{background:rgba(5,5,10,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:1rem 3rem;}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--text);letter-spacing:.05em}
.nav-logo a{text-decoration:none; color:inherit;}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:2.5rem}
.nav-links a{color:var(--muted);font-size:.9rem;text-decoration:none;transition:color .2s;font-weight:500;}
.nav-links a:hover{color:var(--text)}

/* Utility */
.wrap{max-width:1100px;margin:0 auto;padding:0 2.5rem}
section{padding:7rem 0}
.divider{height:1px;background:linear-gradient(90deg, transparent, var(--border), transparent);max-width:1100px;margin:0 auto}
.section-label{display:inline-flex;align-items:center;gap:8px;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:1rem}
.section-label::before{content:"";display:block;width:30px;height:2px;background:var(--accent);}
.section-title{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;margin-bottom:3rem;letter-spacing:-0.02em;}

/* Buttons */
.btn{padding:.8rem 2rem;border-radius:12px;font-size:.95rem;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;text-decoration:none;transition:all .3s ease;display:inline-flex;align-items:center;gap:10px;justify-content:center;}
.btn-primary{background:linear-gradient(135deg, var(--accent), #6a55e0);color:#fff;border:none;box-shadow:0 8px 20px rgba(106, 85, 224, 0.25);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 25px rgba(106, 85, 224, 0.35);}
.btn-outline{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--accent);background:var(--surface);transform:translateY(-2px);}

/* Projects Grid */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(400px, 1fr));gap:2.5rem;}
.project-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);position:relative;display:flex;flex-direction:column;}
.project-card:hover{border-color:var(--accent);transform:translateY(-8px);box-shadow:0 15px 35px rgba(0,0,0,0.4), 0 0 20px rgba(139,120,250,0.15);}
.project-video{width:100%;aspect-ratio:16/9;background:var(--surface2);position:relative;}
.project-video iframe{width:100%;height:100%;border:none;position:absolute;top:0;left:0;}
.video-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;color:var(--muted);background:linear-gradient(135deg,#13131e 0%,#1a1a26 100%);padding:2rem;text-align:center;}
.play-icon{width:60px;height:60px;border-radius:50%;background:rgba(139,120,250,.15);border:1px solid rgba(139,120,250,0.3);display:flex;align-items:center;justify-content:center;transition:transform 0.3s ease;}
.project-card:hover .play-icon{transform:scale(1.1);background:var(--accent);}
.project-card:hover .play-icon svg polygon{fill:#fff;}
.project-body{padding:2rem;display:flex;flex-direction:column;flex-grow:1;}
.project-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem}
.project-tag{padding:4px 12px;border-radius:6px;font-size:.75rem;font-weight:600;background:rgba(139,120,250,.1);color:var(--accent2);}
.project-body h3{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:1rem}
.project-body p{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:1.5rem}
.project-bullets{list-style:none;padding:0;margin-bottom:1.5rem}
.project-bullets li{font-size:.9rem;color:var(--muted);line-height:1.6;padding-left:1.2rem;position:relative;margin-bottom:.4rem}
.project-bullets li::before{content:"▹";position:absolute;left:0;color:var(--accent);font-size:1rem;}
.project-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.05);padding-top:1.5rem;margin-top:auto;}
.project-link{display:inline-flex;align-items:center;gap:8px;font-size:.85rem;font-weight:600;color:var(--text);text-decoration:none;transition:all .2s;}
.project-link:hover{color:var(--accent2);}
.video-input-row{display:flex;gap:10px;align-items:center;margin-top:1rem}
.video-input-row input{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.3s;}
.video-input-row input:focus{border-color:var(--accent);}
.video-input-row button{padding:10px 16px;border-radius:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);font-weight:600;font-size:.85rem;cursor:pointer;transition:all 0.3s;}
.video-input-row button:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

footer{text-align:center;padding:2.5rem;color:var(--muted);font-size:.85rem;border-top:1px solid rgba(255,255,255,0.05);}

/* Responsive */
@media (max-width: 900px) {
  .projects-grid { grid-template-columns: 1fr; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<nav id="navbar">
  <div class="nav-logo"><a href="index.html">HAFIZ<span>.</span>AHMED</a></div>
  <div class="nav-links">
    <a href="index.html#about">About</a>
    <a href="index.html#experience">Experience</a>
    <a href="index.html#projects">Featured Projects</a>
    <a href="projects.html" style="color:var(--text)">All Projects</a>
    <a href="index.html#contact">Contact</a>
  </div>
</nav>

<div style="height: 100px;"></div>

<section id="all-projects" style="padding-top: 3rem; min-height: calc(100vh - 100px - 85px);">
  <div class="wrap">
    <div class="section-label">Archive</div>
    <div class="section-title">All My Projects</div>
    <p style="color:var(--muted);font-size:1.05rem;margin-bottom:3rem;max-width:600px;">A complete showcase of all the games I've designed and developed. Paste a YouTube URL on any card to embed your gameplay video directly.</p>
    
    <div id="project-list" class="projects-grid"></div>
  </div>
</section>

<footer><p>Hafiz Ahmed · Developer · Kerala © 2025</p></footer>

<script>
// Navbar scroll effect
window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  if (window.scrollY > 50) {
    nav.classList.add('scrolled');
  } else {
    nav.classList.remove('scrolled');
  }
});

const GH = "https://github.com/hafiz";
// All projects for the dedicated page
const allProjects = [
  {
    title: "Knife Throw — Multiplayer PvP",
    tags: ["Unity", "Photon Realtime", "C#", "Multiplayer"],
    desc: "A competitive real-time multiplayer knife-throwing game.",
    bullets: [
      "Rebuilt single-player mechanic into real-time PvP using Photon",
      "Synced knife spawning, collisions, hit detection, and log rotation across players",
      "Designed UI animations, match start flow, and player profile system"
    ],
    videoUrl: "", github: GH, placeholder: "Knife Throw PvP"
  },
  {
    title: "Mini NBA",
    tags: ["Unity", "ProBuilder", "C#", "Casual"],
    desc: "A fun, casual endless basketball scoring game.",
    bullets: [
      "Implemented character controls, shooting mechanics, and spawn logic",
      "Designed score system, difficulty scaling, and camera movement",
      "Added smooth feel using easing and animation events"
    ],
    videoUrl: "", github: GH, placeholder: "Mini NBA"
  },
  {
    title: "Rush — 3D Racing",
    tags: ["Unity", "C#", "3D", "Racing", "AI"],
    desc: "A 3D racing game with AI opponents and drift mechanics.",
    bullets: [
      "Built AI path-following system using waypoints",
      "Implemented car physics, drift handling, and timer mode",
      "Created multiple playable cars using ScriptableObjects"
    ],
    videoUrl: "", github: GH, placeholder: "Rush Racing"
  },
  {
    title: "Theft N Drift",
    tags: ["Unity", "ProBuilder", "C#", "Mobile"],
    desc: "A car survival and drifting game with police AI chase.",
    bullets: [
      "Implemented police AI chase and avoidance logic",
      "Designed level hazards and procedural enemy behavior",
      "Optimized performance and physics for mobile platforms"
    ],
    videoUrl: "", github: GH, placeholder: "Theft N Drift"
  },
  {
    title: "Escape From Dungeon",
    tags: ["Unreal Engine", "C++", "Puzzle", "Adventure"],
    desc: "A puzzle-based adventure prototype built in Unreal Engine.",
    bullets: [
      "Built puzzle triggers, traps, and door mechanisms in C++",
      "Implemented basic AI and level interaction systems"
    ],
    videoUrl: "", github: GH, placeholder: "Escape From Dungeon"
  }
];

function getEmbedUrl(url) {
  try {
    const u = new URL(url);
    let id = u.searchParams.get('v');
    if (!id && u.hostname === 'youtu.be') id = u.pathname.slice(1);
    if (!id) { const m = url.match(/embed\/([^?&]+)/); if (m) id = m[1]; }
    return id ? `https://www.youtube.com/embed/${id}` : null;
  } catch { return null; }
}

function renderProjects() {
  const c = document.getElementById('project-list');
  if(!c) return;
  c.innerHTML = '';
  allProjects.forEach((p, index) => {
    const embed = p.videoUrl ? getEmbedUrl(p.videoUrl) : null;
    const card = document.createElement('div');
    card.className = 'project-card';
    card.innerHTML = `
      <div class="project-video">
        ${embed
          ? `<iframe src="${embed}" allow="autoplay;encrypted-media" allowfullscreen></iframe>`
          : `<div class="video-placeholder">
              <div class="play-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="#a78bfa"><polygon points="5,3 19,12 5,21"/></svg></div>
              <span style="font-weight:600; font-size:1.1rem; color:var(--text);">${p.placeholder}</span>
              <span style="font-size:.8rem;opacity:.6">Add your YouTube video link</span>
            </div>`}
      </div>
      <div class="project-body">
        <div class="project-tags">${p.tags.map(t=>`<span class="project-tag">${t}</span>`).join('')}</div>
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <ul class="project-bullets">${p.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
        
        <div class="video-input-row">
          <input type="text" id="vid-${index}" placeholder="Paste YouTube URL..." value="${p.videoUrl}"/>
          <button onclick="setVideo(${index})">Embed</button>
        </div>
        <div class="project-footer">
          <a href="${p.github}" target="_blank" class="project-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.1.82-.26.82-.58v-2.03c-3.34.73-4.04-1.6-4.04-1.6-.54-1.4-1.33-1.77-1.33-1.77-1.09-.74.08-.73.08-.73 1.2.09 1.83 1.24 1.83 1.24 1.07 1.83 2.81 1.3 3.5 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.28-1.23 3.28-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
            View Code
          </a>
        </div>
      </div>`;
    c.appendChild(card);
  });
}

function setVideo(i) {
  allProjects[i].videoUrl = document.getElementById(`vid-${i}`).value.trim();
  renderProjects();
}

renderProjects();
</script>
</body>
</html>
